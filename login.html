<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ArchViz Architectural Visualizer</title>
    
    <!-- CSS References -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap-grid.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="p-0 overflow-hidden">

    <main class="auth-wrapper">
        <!-- Form Container -->
        <div class="auth-form-side">


            <div class="auth-box">
                <div class="text-center mb-5">
                    <a href="index.html" class="nav-logo mb-4 fs-3 d-inline-block"><i class="bi bi-box-seam"></i> ARCHVIZ</a>
                    <h1 class="h4 fw-bold mb-1">Welcome Back</h1>
                    <p class="text-secondary small">Access your project dashboard.</p>
                </div>

                <form>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="auth-input" placeholder="name@studio.com" required>
                    </div>

                    <div class="form-group">
                        <div class="d-flex justify-content-between">
                            <label class="form-label">Password</label>
                            <a href="#" class="small text-secondary text-decoration-underline">Forgot?</a>
                        </div>
                        <input type="password" class="auth-input" placeholder="••••••••" required>
                    </div>

                    <div class="mb-4 d-flex align-items-center gap-2">
                        <input type="checkbox" id="remember" class="form-check-input mt-0">
                        <label for="remember" class="small text-secondary mb-0">Remember me</label>
                    </div>

                    <div class="mb-4 pt-2 text-center">
                        <button type="submit" class="btn-primary py-3 px-5" style="min-width: 220px;">Sign In</button>
                    </div>

                    <div class="d-flex align-items-center my-4 py-2">
                        <div class="flex-grow-1 border-top opacity-10"></div>
                        <span class="px-3 text-secondary small fw-bold" style="letter-spacing: 1px;">OR CONTINUE WITH</span>
                        <div class="flex-grow-1 border-top opacity-10"></div>
                    </div>

                    <div class="social-auth mb-5">
                        <button type="button" class="social-btn">
                            <i class="bi bi-google"></i>
                            Google
                        </button>
                        <button type="button" class="social-btn">
                            <i class="bi bi-linkedin"></i>
                            LinkedIn
                        </button>
                    </div>

                    <p class="text-center text-secondary small mb-0">
                        Don't have an account? <a href="signup.html" class="text-primary fw-bold">Sign up free</a>
                    </p>
                </form>
            </div>
        </div>
    </main>




    <script src="assets/js/theme-toggle.js"></script>

</body>
</html>
